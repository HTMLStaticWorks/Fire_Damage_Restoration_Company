<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - RestoreX</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header id="main-header"></header>

    <main>
        <section class="section-padding bg-light mt-5 text-center">
            <div class="container container-custom">
                <h1>Get in Touch</h1>
                <p>We are available 24/7 for emergency restoration house calls.</p>
            </div>
        </section>

        <section class="section-padding">
            <div class="container container-custom">
                <div class="row g-5">
                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm p-4 rounded-4 h-100">
                            <h3 class="mb-4">Send us a Message</h3>
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <input type="text" class="form-control p-3" placeholder="Full Name">
                                    </div>
                                    <div class="col-md-6">
                                        <input type="email" class="form-control p-3" placeholder="Email Address">
                                    </div>
                                    <div class="col-12">
                                        <select class="form-select p-3">
                                            <option selected>Select Service</option>
                                            <option>Fire Damage</option>
                                            <option>Water Damage</option>
                                            <option>Mold Remediation</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <textarea class="form-control p-3" rows="5"
                                            placeholder="Your Message"></textarea>
                                    </div>
                                    <div class="col-12">
                                        <button class="btn btn-primary w-100 p-3 fw-bold">Submit Request</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="p-4 rounded-4 bg-white shadow-sm h-100">
                            <h3 class="mb-4">Contact Information</h3>
                            <div class="d-flex flex-column gap-4">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="icon-box bg-light-black text-white p-3 rounded-3"><img
                                            src="assets/images/icons/arrow_up_icon.png" class="img-icon" alt="Location">
                                    </div>
                                    <div>
                                        <h5 class="mb-0 fw-bold">Headquarters</h5>
                                        <p class="mb-0 text-dark">123 Restoration Way, NY 10001</p>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="icon-box bg-light-black text-white p-3 rounded-3"><img
                                            src="assets/images/icons/phone_icon.png" class="img-icon" alt="Phone"></div>
                                    <div>
                                        <h5 class="mb-0 fw-bold">Phone</h5>
                                        <p class="mb-0 text-dark">1-800-RestoreX</p>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="icon-box bg-light-black text-white p-3 rounded-3"><img
                                            src="assets/images/icons/chat_icon.png" class="img-icon" alt="Email"></div>
                                    <div>
                                        <h5 class="mb-0 fw-bold">Email</h5>
                                        <p class="mb-0 text-dark">help@RestoreXrestore.com</p>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-5 pt-4 border-top">
                                <h5 class="fw-bold mb-3">Follow Us</h5>
                                <div class="d-flex gap-3 social-links">
                                    <a href="#" class="social-login-btn"><img src="assets/images/icons/fb_icon.png" alt="Facebook"></a>
                                    <a href="#" class="social-login-btn"><img src="assets/images/icons/tw_icon.png" alt="Twitter"></a>
                                    <a href="#" class="social-login-btn"><img src="assets/images/icons/ig_icon.png" alt="Instagram"></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-5">
                    <div class="col-12">
                        <div class="rounded-4 overflow-hidden shadow-sm" style="height: 450px;">
                            <iframe
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d193595.252808218!2d-74.11976373946229!3d40.69766374874431!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xc80b8f06e177fe62!2sNew%20York%2C%20NY!5e0!3m2!1sen!2sus!4v1711364531234!5m2!1sen!2sus"
                                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
