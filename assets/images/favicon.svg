<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Plate -->
  <circle cx="50" cy="50" r="48" fill="white" />
  <!-- Shield/House Silhouette (Light Black) -->
  <path d="M50 5 L90 25 V60 C90 85 50 95 50 95 C50 95 10 85 10 60 V25 L50 5Z" fill="#1a1a1a" />
  
