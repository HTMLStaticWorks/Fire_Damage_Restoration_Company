<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RestoreX Portal</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <header id="main-header"></header>

    <main>
        <section class="section-padding mt-5 d-flex align-items-center" style="min-height: 80vh;">
            <div class="container container-custom">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-lg p-4 p-md-5 rounded-4">
                            <div class="text-center mb-4">
                                <img src="assets/images/logo.svg" height="50" class="mb-3">
                                <h3>Create Account</h3>
                                <p class="text-dark small">Join the RestoreX portal to manage your restoration.</p>
                            </div>
                            <form action="dashboard.html">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small">First Name</label>
                                        <input type="text" class="form-control p-3" placeholder="John" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small">Last Name</label>
                                        <input type="text" class="form-control p-3" placeholder="Doe" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold small">Email Address</label>
                                        <input type="email" class="form-control p-3" placeholder="john@example.com" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold small">Role</label>
                                        <select class="form-select p-3">
                                            <option value="homeowner">Homeowner</option>
                                            <option value="adjuster">Insurance Adjuster</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold small">Password</label>
                                        <input type="password" class="form-control p-3" placeholder="Min. 8 characters" required>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-check">
                                            <input type="checkbox" class="form-check-input" id="terms" required>
                                            <label class="form-check-label small" for="terms">I agree to the <a href="#">Terms & Privacy Policy</a></label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100 p-3 fw-bold">Create Account</button>
                                    </div>
                                </div>
                            </form>
                            <div class="text-center mt-4">
                                <p class="small text-dark mb-0">Already have an account? <a href="login.html" class="fw-bold text-decoration-none">Sign In</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
