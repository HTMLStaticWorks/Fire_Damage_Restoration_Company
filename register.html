<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RestoreX Portal</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <div class="position-fixed top-0 end-0 p-3 d-flex gap-2" style="z-index: 1050;">
        <button id="theme-toggle" class="btn btn-sm btn-dark" style="padding: 4px;">
            <img src="assets/images/icons/moon_icon.png" class="img-icon theme-icon-img" alt="Theme">
        </button>
        <button id="rtl-toggle" class="btn btn-sm btn-secondary">RTL</button>
    </div>


    <main>
        <section class="section-padding d-flex align-items-center" style="min-height: 100vh;">
            <div class="container container-custom">
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="card border-0 shadow-lg p-3 p-md-4 rounded-4">
                            <div class="text-center mb-3">
                                <a href="index.html">
                                    <img src="assets/images/logo.svg" height="50" class="mb-3">
                                </a>
                                <h3>Create Account</h3>
                                <p class="text-dark small">Join the RestoreX portal to manage your restoration.</p>
                            </div>
                            <form action="dashboard.html" class="auth-form">
                                <div class="row g-2">
                                    <div class="col-12">
                                        <label class="form-label fw-bold small">Full Name</label>
                                        <input type="text" class="form-control p-2" placeholder="John Doe" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold small">Email Address</label>
                                        <input type="email" class="form-control p-2" placeholder="john@example.com" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold small">Role</label>
                                        <select class="form-select p-2">
                                            <option value="homeowner">Homeowner</option>
                                            <option value="adjuster">Insurance Adjuster</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold small">Password</label>
                                        <input type="password" class="form-control p-2" placeholder="Min. 8 characters" required>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-check">
                                            <input type="checkbox" class="form-check-input" id="terms" required>
                                            <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-orange text-decoration-none">Terms & Privacy Policy</a></label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100 p-2 fw-bold">Create Account</button>
                                    </div>
                                </div>
                            </form>
                            <div class="text-center mt-3">
                                <p class="small text-dark mb-0">Already have an account? <a href="login.html" class="fw-bold text-decoration-none text-orange">Sign In</a></p>
                            </div>
                            <div class="text-center mt-3 pt-3 border-top">
                                <p class="small text-muted mb-2">Or continue with</p>
                                <div class="d-flex justify-content-center gap-3 social-icons-row">
                                    <a href="#" class="btn social-login-btn btn-sm shadow-sm p-2"><img src="assets/images/icons/fb_icon.png" width="20"></a>
                                    <a href="#" class="btn social-login-btn btn-sm shadow-sm p-2"><img src="assets/images/icons/tw_icon.png" width="20"></a>
                                    <a href="#" class="btn social-login-btn btn-sm shadow-sm p-2"><img src="assets/images/icons/ig_icon.png" width="20"></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
