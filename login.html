<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RestoreX Portal</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <header id="main-header"></header>

    <main>
        <section class="section-padding mt-5 d-flex align-items-center" style="min-height: 80vh;">
            <div class="container container-custom">
                <div class="row justify-content-center">
                    <div class="col-md-5">
                        <div class="card border-0 shadow-lg p-4 p-md-5 rounded-4">
                            <div class="text-center mb-4">
                                <img src="assets/images/logo.svg" height="50" class="mb-3">
                                <h3>Welcome Back</h3>
                                <p class="text-dark small">Sign in to track your restoration project.</p>
                            </div>
                            <form action="dashboard.html">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Email Address</label>
                                    <input type="email" class="form-control p-3" placeholder="name@company.com" required>
                                </div>
                                <div class="mb-3">
                                    <div class="d-flex justify-content-between">
                                        <label class="form-label fw-bold">Password</label>
                                        <a href="#" class="small text-decoration-none">Forgot?</a>
                                    </div>
                                    <input type="password" class="form-control p-3" placeholder="••••••••" required>
                                </div>
                                <div class="mb-4 form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label small" for="remember">Remember this device</label>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 p-3 fw-bold">Sign In</button>
                            </form>
                            <div class="text-center mt-4">
                                <p class="small text-dark mb-0">Don't have an account? <a href="register.html" class="fw-bold text-decoration-none">Register Now</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
